<!DOCTYPE html>
<html>
<head>
  <title>Warning Details</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f14;
      color: white;
      padding: 20px;
    }
  </style>
</head>
<body>

<h1 id="type"></h1>
<h3 id="area"></h3>
<p><b>Issued:</b> <span id="issued"></span></p>
<p id="details"></p>

<script>
function getID() {
  const params = new URLSearchParams(window.location.search);
  return params.get("id");
}

async function loadWarning() {
  const id = getID();
  const res = await fetch("warnings.json");
  const data = await res.json();

  const warning = data.find(w => w.id == id);

  if (!warning) {
    document.body.innerHTML = "Warning not found.";
    return;
  }

  document.getElementById("type").innerText = warning.type;
  document.getElementById("area").innerText = warning.area;
  document.getElementById("issued").innerText = warning.issued;
  document.getElementById("details").innerText = warning.details;
}

loadWarning();
</script>

</body>
</html>
