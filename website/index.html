<!DOCTYPE html>
<html>
<head>
  <title>Fictonia Warning Feed</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f14;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .warning {
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .warning:hover {
      opacity: 0.8;
    }

    .high { background: #b00020; }
    .moderate { background: #e65100; }
    .low { background: #1565c0; }
  </style>
</head>
<body>

<h1>Fictonia Warning Feed</h1>
<div id="feed"></div>

<script>
async function loadWarnings() {
  const res = await fetch("website/warnings.json");
  const data = await res.json();

  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  data.slice().reverse().forEach(w => {
    const div = document.createElement("div");
    div.className = "warning " + w.severity;

    div.innerHTML = `
      <b>${w.type}</b><br>
      ${w.area}<br>
      <small>${w.issued}</small>
    `;

    div.onclick = () => {
      window.location.href = "view.html?id=" + w.id;
    };

    feed.appendChild(div);
  });
}

// Load initially
loadWarnings();

// Auto-refresh every 30 seconds
setInterval(loadWarnings, 30000);
</script>

</body>
</html>
